<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-fluid py-3 px-4">
    <header class="text-center mb-4 border-bottom pb-3">
        <h1 class="display-6 fw-bold">Prompt Builder</h1>
        <p class="text-muted small text-uppercase letter-spacing-2">Збираю промпт під задачу і перевіряю якість відповіді</p>
    </header>

    <main class="row g-3">
        <section class="col-xl-4 col-lg-6">
            <div class="card h-100 shadow-lg border-0">
                <div class="card-header border-bottom pb-2 pt-4">
                    <h2 class="h5 mb-0 text-center">Задача</h2>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Role</label>
                        <div class="input-group mb-2">
                            <label class="visually-hidden" for="role">Виберіть роль</label>
                            <select id="role" class="form-select">
                                <option value="Developer">Developer</option>
                                <option value="Marketer">Marketer</option>
                                <option value="HR">HR</option>
                                <option value="Analyst">Analyst</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">Task type</label>
                        <div class="input-group mb-2">
                            <label class="visually-hidden" for="taskType">Виберіть тип задачі</label>
                            <select id="taskType" class="form-select">
                                <option value="Summarize">Summarize</option>
                                <option value="Generate">Generate</option>
                                <option value="Refactor">Refactor</option>
                                <option value="Explain">Explain</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="context" class="form-label fw-bold small">Context</label>
                        <textarea id="context" class="form-control" rows="6" placeholder="Опишіть суть задачі..."></textarea>
                        <div class="invalid-feedback">Контекст не може бути порожнім!</div>
                    </div>

                    <div class="mb-3">
                        <label for="constraints" class="form-label fw-bold small">Constraints</label>
                        <textarea id="constraints" class="form-control" rows="3" placeholder="тон, мова, формат, ліміти, що не робити"></textarea>
                    </div>

                    <div class="mb-4">
                        <label for="format" class="form-label fw-bold small">Output format</label>
                        <select id="format" class="form-select">
                            <option value="Bullet list">Bullet list</option>
                            <option value="Table">Table</option>
                            <option value="JSON">JSON</option>
                        </select>
                    </div>

                    <button id="btnGenerate" class="btn btn-primary w-100 py-3 shadow">Generate prompt</button>
                </div>
            </div>
        </section>

        <section class="col-xl-4 col-lg-6">
            <div class="d-flex flex-column h-100">
                <div class="card shadow-lg border-0 mb-3">
                    <div class="card-header border-bottom pb-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <h2 class="h5 card-title mb-0">Generated prompt</h2>
                            <div class="btn-group">
                                <button id="copyBtn" class="btn btn-outline-primary btn-sm px-3">Copy</button>
                                <button id="btnClear" class="btn btn-outline-danger btn-sm">Clear</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <textarea id="resultPrompt" class="form-control" rows="5" readonly placeholder="Тут з'явиться ваш промпт..."></textarea>
                    </div>
                </div>

                <div class="card shadow-lg border-0 flex-grow-1">
                    <div class="card-header border-bottom pb-2">
                        <h2 class="h5 card-title mb-0 text-center">Paste AI answer</h2>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <label for="aiAnswer" class="visually-hidden">Відповідь ШІ</label>
                        <textarea id="aiAnswer" class="form-control flex-grow-1 mb-2" style="min-height: 250px;" placeholder="Вставте відповідь від ШІ для перевірки..."></textarea>
                    </div>
                </div>
            </div>
        </section>

        <section class="col-xl-4 col-lg-12">
            <div class="card h-100 shadow-lg border-primary border-top-width-5">
                <div class="card-header border-bottom pb-2 mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h2 class="h5 mb-0">QA checklist</h2>
                        <span id="scoreBadge" class="badge rounded-pill bg-danger fs-6">0/8 пройдено</span>
                    </div>
                </div>
                <div class="card-body">
                    <div id="checklist" class="row">
                        <div class="col-sm-6 col-xl-12 mb-2">
                            <div class="form-check p-2 rounded border d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="checkbox" id="check1" data-advice="Перевірте, чи ШІ дійсно виконав основну мету запиту.">
                                <label class="form-check-label small fw-bold flex-grow-1" for="check1">Відповідь відповідає задачі</label>
                            </div>
                        </div>
                        <div class="col-sm-6 col-xl-12 mb-2">
                            <div class="form-check p-2 rounded border d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="checkbox" id="check2" data-advice="Чи логічно структурована відповідь? Чи є заголовки?">
                                <label class="form-check-label small fw-bold flex-grow-1" for="check2">Є структура</label>
                            </div>
                        </div>
                        <div class="col-sm-6 col-xl-12 mb-2">
                            <div class="form-check p-2 rounded border d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="checkbox" id="check3" data-advice="Переконайтеся, що факти правдиві.">
                                <label class="form-check-label small fw-bold flex-grow-1" for="check3">Немає вигаданих фактів (або “позначено невпевненість”)</label>
                            </div>
                        </div>
                        <div class="col-sm-6 col-xl-12 mb-2">
                            <div class="form-check p-2 rounded border d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="checkbox" id="check4" data-advice="Додайте в промпт прохання навести приклади.">
                                <label class="form-check-label small fw-bold flex-grow-1" for="check4">Є конкретика (кроки/приклади)</label>
                            </div>
                        </div>
                        <div class="col-sm-6 col-xl-12 mb-2">
                            <div class="form-check p-2 rounded border d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="checkbox" id="check5" data-advice="Перевірте відповідність формату (JSON/Table).">
                                <label class="form-check-label small fw-bold flex-grow-1" for="check5">Дотримано формат (bullet/table/json)</label>
                            </div>
                        </div>
                        <div class="col-sm-6 col-xl-12 mb-2">
                            <div class="form-check p-2 rounded border d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="checkbox" id="check6" data-advice="Чи витримано потрібний тон мовлення?">
                                <label class="form-check-label small fw-bold flex-grow-1" for="check6">Дотримано обмеження (тон/мова/ліміти)</label>
                            </div>
                        </div>
                        <div class="col-sm-6 col-xl-12 mb-2">
                            <div class="form-check p-2 rounded border d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="checkbox" id="check7" data-advice="Додайте застереження для критичних випадків.">
                                <label class="form-check-label small fw-bold flex-grow-1" for="check7">Є ризики/edge cases (якщо доречно)</label>
                            </div>
                        </div>
                        <div class="col-sm-6 col-xl-12 mb-2">
                            <div class="form-check p-2 rounded border d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="checkbox" id="check8" data-advice="Сформулюйте наступне уточнююче питання.">
                                <label class="form-check-label small fw-bold flex-grow-1" for="check8">Наступні кроки запропоновані</label>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 p-3 bg-dark-custom rounded shadow-inner">
                        <p class="small fw-bold mb-2">Explain improvements:</p>
                        <button id="btnImprove" class="btn btn-info btn-sm w-100 text-white fw-bold mb-3 shadow-sm">Suggest improvements</button>
                        <div id="improvementsList" class="small overflow-auto" style="max-height: 150px;"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
